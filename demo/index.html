<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>audio-snip demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; color: #333; }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input[type="text"] { width: 100%; padding: 0.5rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; margin-top: 0.25rem; }
    .range-row { display: flex; gap: 1rem; align-items: center; margin-top: 0.5rem; }
    .range-row input[type="range"] { flex: 1; }
    .range-row span { min-width: 4rem; text-align: right; font-variant-numeric: tabular-nums; }
    button { margin-top: 1rem; padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 4px; background: #2563eb; color: #fff; }
    button:disabled { opacity: 0.5; cursor: default; }
    button:hover:not(:disabled) { background: #1d4ed8; }
    canvas { width: 100%; height: 120px; margin-top: 1rem; border: 1px solid #ddd; border-radius: 4px; }
    #status { margin-top: 0.5rem; font-size: 0.85rem; color: #666; min-height: 1.2em; }
    .btn-row { display: flex; gap: 0.5rem; }

    /* ── File list ── */
    .file-list { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
    .file-btn { display: flex; flex-direction: column; align-items: flex-start; padding: 0.5rem 0.75rem; border: 2px solid #e5e7eb; border-radius: 6px; background: #fff; cursor: pointer; transition: border-color 0.15s, background 0.15s; min-width: 160px; margin-top: 0; }
    .file-btn:hover { border-color: #93c5fd; background: #eff6ff; }
    .file-btn.selected { border-color: #2563eb; background: #eff6ff; }
    .file-name { font-weight: 600; font-size: 0.9rem; color: #333; }
    .file-meta { font-size: 0.75rem; color: #888; margin-top: 0.15rem; }

    /* ── Network panel ── */
    #network-panel { margin-top: 1.5rem; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    #network-panel summary { padding: 0.75rem 1rem; background: #f9fafb; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
    #network-panel summary:hover { background: #f3f4f6; }
    #network-summary { font-weight: 400; color: #666; margin-left: 0.5rem; }
    #network-log { max-height: 280px; overflow-y: auto; font-size: 0.8rem; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; }
    .net-row { display: grid; grid-template-columns: 2fr 1.2fr 0.8fr 0.8fr 0.6fr; padding: 0.35rem 1rem; border-top: 1px solid #f0f0f0; align-items: center; }
    .net-row:hover { background: #f9fafb; }
    .net-header { font-weight: 600; background: #f3f4f6; border-top: none; color: #555; position: sticky; top: 0; }
    .badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
    .badge-206 { background: #dcfce7; color: #166534; }
    .badge-200 { background: #fef3c7; color: #92400e; }
    .badge-head { background: #e0e7ff; color: #3730a3; }
    .badge-unknown { background: #f3f4f6; color: #888; }
    .sw-status { padding: 0.5rem 1rem; font-size: 0.8rem; color: #888; border-top: 1px solid #f0f0f0; }
    .server-range-row { padding: 0.6rem 1rem; border-top: 1px solid #f0f0f0; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
    .server-range-row strong { white-space: nowrap; }
    .savings { color: #dc2626; font-size: 0.7rem; margin-left: 0.25rem; }

    /* ── Transfer bar ── */
    #transfer-bar { margin-top: 1rem; padding: 0.75rem 1rem; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; }
    .transfer-visual { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.5rem; }
    .transfer-track { flex: 1; height: 24px; background: #e5e7eb; border-radius: 4px; overflow: hidden; position: relative; }
    .transfer-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 4px; transition: width 0.3s ease; min-width: 2px; }
    .transfer-label { font-size: 0.85rem; font-variant-numeric: tabular-nums; min-width: 6rem; }
    .transfer-title { font-weight: 600; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>audio-snip</h1>
  <p class="subtitle">Decode audio segments via HTTP Range requests — without downloading the full file.</p>

  <label>Test files</label>
  <div class="file-list" id="file-list">
    <button class="file-btn selected" data-url="fixtures/test-cbr.mp3" data-duration="660">
      <span class="file-name">test-cbr.mp3</span>
      <span class="file-meta">MP3 CBR 128kbps &middot; 11 min &middot; 10 MB</span>
    </button>
    <button class="file-btn" data-url="fixtures/test-vbr.mp3" data-duration="60">
      <span class="file-name">test-vbr.mp3</span>
      <span class="file-meta">MP3 VBR &middot; 1 min &middot; 374 KB</span>
    </button>
    <button class="file-btn" data-url="fixtures/test.m4a" data-duration="3300">
      <span class="file-name">test.m4a</span>
      <span class="file-meta">AAC 128kbps &middot; 55 min &middot; 51 MB</span>
    </button>
    <button class="file-btn" data-url="fixtures/test.mp4" data-duration="300">
      <span class="file-name">test.mp4</span>
      <span class="file-meta">H.264 + AAC &middot; 5 min &middot; 44 MB</span>
    </button>
  </div>

  <label>Or enter URL
    <input id="url" type="text" value="fixtures/test-cbr.mp3" />
  </label>

  <label>Start time (s)</label>
  <div class="range-row">
    <input id="start" type="range" min="0" max="660" step="0.1" value="10" />
    <span id="startVal">10.0</span>
  </div>

  <label>End time (s)</label>
  <div class="range-row">
    <input id="end" type="range" min="0" max="660" step="0.1" value="30" />
    <span id="endVal">30.0</span>
  </div>

  <div class="btn-row">
    <button id="load">Load segment</button>
    <button id="play" disabled>Play</button>
    <button id="stop" disabled>Stop</button>
  </div>
  <div id="status"></div>

  <canvas id="waveform"></canvas>

  <!-- Transfer summary -->
  <div id="transfer-bar" hidden>
    <div class="transfer-title">Data transferred</div>
    <div class="transfer-visual">
      <div class="transfer-track">
        <div class="transfer-fill" id="transfer-fill" style="width: 0%"></div>
      </div>
      <span class="transfer-label" id="transfer-label">0 KB / 0 MB</span>
    </div>
  </div>

  <!-- Network log panel -->
  <details id="network-panel" open>
    <summary>
      Network log
      <span id="network-summary">0 requests</span>
    </summary>
    <div class="server-range-row">
      <strong>Server Range support:</strong>
      <span class="badge badge-unknown" id="server-range-badge">unknown</span>
    </div>
    <div id="network-log">
      <div class="net-row net-header">
        <span>File</span>
        <span>Requested range</span>
        <span>Origin HTTP</span>
        <span>Server sent</span>
        <span>Client got</span>
      </div>
    </div>
    <div class="sw-status" id="sw-status">Registering Service Worker...</div>
  </details>

  <script type="module" src="./main.ts"></script>
</body>
</html>
